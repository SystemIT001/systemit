<!DOCTYPE html>
<html>
<body>
  <h1>C&C System Fetch Debugger</h1>
  <button onclick="testFetch()">Test API Fetch</button>
  <pre id="output" style="background:#eee; padding:10px; min-height:100px; border:1px solid #ccc;"></pre>
  
  <script>
    async function testFetch() {
      const output = document.getElementById('output');
      output.innerText = "Fetching...";
      
      try {
        const authStr = localStorage.getItem('systemit_auth');
        let token = '';
        if (authStr) {
          try {
            token = JSON.parse(authStr).token;
          } catch(e){}
        }
        
        const res = await fetch('/api/projects.php', {
          credentials: 'same-origin',
          headers: token ? { 'Authorization': 'Bearer ' + token } : {}
        });
        
        const text = await res.text();
        output.innerText = "Status: " + res.status + "\n\nResponse Body:\n" + text;
      } catch (err) {
        output.innerText = "Fetch Exception: " + err.message;
      }
    }
  </script>
</body>
</html>
